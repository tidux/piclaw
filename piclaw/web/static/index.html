<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1d9bf0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PiClaw</title>
    <link rel="stylesheet" href="/static/css/katex.min.css">
    <link rel="stylesheet" href="/static/css/styles.css?v=50">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
    <div id="app">
        <div style="padding: 20px; text-align: center;">Loading...</div>
    </div>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('app').innerHTML = '<pre style="padding:20px;color:red;">Error: ' + msg + '\nLine: ' + line + '</pre>';
            return false;
        };
    </script>
    <script src="/static/js/marked.min.js"></script>
    <script src="/static/js/vendor/katex.min.js"></script>
    <script src="/static/js/vendor/beautiful-mermaid.js"></script>
    <script type="module" src="/static/js/app.js?v=60"></script>
    <script type="module">
        // Fallback error display for module errors
        import('./static/js/app.js?v=60').catch(function(e) {
            document.getElementById('app').innerHTML = '<pre style="padding:20px;color:red;">Module Error: ' + e.message + '</pre>';
        });
    </script>
</body>
</html>
