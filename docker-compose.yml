services:
  pibox:
    image: pibox:latest
    shm_size: '256m'
    init: true
    container_name: pibox
    hostname: pibox
    environment:
      TERM: xterm-256color
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      PICLAW_WEB_PORT: "${PICLAW_WEB_PORT:-8080}"
      PICLAW_AUTOSTART: "${PICLAW_AUTOSTART:-1}"
    ports:
      - "${PICLAW_WEB_BIND_HOST:-127.0.0.1}:${PICLAW_WEB_PORT:-8080}:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMITS:-2}'
          memory: '${MEMORY_LIMITS:-4G}'
    volumes:
      - ${CONFIG_PATH:-pibox-config}:/config  # named volume by default; set CONFIG_PATH=./home to use a host bind mount instead
      - workspace:/workspace    # workspace + piclaw state (SQLite, sessions, IPC)
    networks:
      - pibox

volumes:
  pibox-config:
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORKSPACE_PATH:-./workspace}

networks:
  pibox:
    driver: bridge
