services:
  pibox:
    image: pibox:latest
    container_name: pibox
    hostname: pibox
    environment:
      TERM: xterm-256color
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      PICLAW_WEB_PORT: "${PICLAW_WEB_PORT:-8080}"
      PICLAW_AUTOSTART: "${PICLAW_AUTOSTART:-1}"
    ports:
      - "${PICLAW_WEB_PORT:-8080}:8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMITS:-2}'
          memory: '${MEMORY_LIMITS:-4G}'
    volumes:
      - ./home:/config          # agent home dir persistence (.pi, .gitconfig)
      - workspace:/workspace    # workspace + piclaw state (SQLite, sessions, IPC)
    networks:
      - pibox

volumes:
  workspace:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WORKSPACE_PATH:-./workspace}

networks:
  pibox:
    driver: bridge
