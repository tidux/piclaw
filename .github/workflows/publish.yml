name: Publish Docker images

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUN_PREFER_BASELINE: "always"

jobs:
  # Full integration validation must pass before any Docker build starts.
  # The integration-gate workflow runs on the same tag push event;
  # this job waits for it to complete successfully.
  wait-for-integration:
    name: Wait for integration gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for integration-gate workflow
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = context.sha;
            const workflowName = 'Integration gate';
            const maxWaitMs = 30 * 60 * 1000; // 30 minutes
            const pollMs = 15_000;
            const started = Date.now();

            core.info(`Waiting for "${workflowName}" to complete on ${headSha}...`);

            while (Date.now() - started < maxWaitMs) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo,
                head_sha: headSha,
                per_page: 20,
              });

              const match = runs.data.workflow_runs.find(
                (run) => run.name === workflowName
              );

              if (match) {
                if (match.status === 'completed') {
                  if (match.conclusion === 'success') {
                    core.info(`Integration gate passed (run ${match.id}).`);
                    return;
                  }
                  core.setFailed(`Integration gate failed with conclusion: ${match.conclusion} (run ${match.id}).`);
                  return;
                }
                core.info(`Integration gate status: ${match.status} — polling again in ${pollMs / 1000}s...`);
              } else {
                core.info(`Integration gate run not found yet — polling again in ${pollMs / 1000}s...`);
              }

              await new Promise((resolve) => setTimeout(resolve, pollMs));
            }

            core.setFailed('Timed out waiting for integration gate workflow.');

  # Repo-owned boundary: publish smoke already routes through `make publish-smoke`.
  # Workflow-native boundary: reading pinned runtime versions from repo files stays here
  # because the values are consumed immediately as job outputs inside GitHub Actions.
  resolve-runtime-versions:
    name: Read pinned runtime versions
    runs-on: ubuntu-latest
    outputs:
      bun_version: ${{ steps.resolve-bun.outputs.version }}
      restic_version: ${{ steps.resolve-restic.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Bun version from repo file
        id: resolve-bun
        run: |
          version=$(tr -d '[:space:]' < BUN_VERSION)
          if [ -z "$version" ]; then
            echo "BUN_VERSION file is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Read restic version from repo file
        id: resolve-restic
        run: |
          version=$(tr -d '[:space:]' < RESTIC_VERSION)
          if [ -z "$version" ]; then
            echo "RESTIC_VERSION file is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # Build/push remains workflow-native because it is GitHub-runner-specific Docker orchestration.
  # Build AMD64 image on native Intel runner
  build-amd64:
    name: Build AMD64 image
    needs: [wait-for-integration, resolve-runtime-versions]
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push AMD64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          build-args: |
            BUN_VERSION=${{ needs.resolve-runtime-versions.outputs.bun_version }}
            BUN_PREFER_BASELINE=${{ env.BUN_PREFER_BASELINE }}

      - name: Smoke test AMD64 image
        continue-on-error: true
        timeout-minutes: 5
        env:
          STATIC_TIMEOUT_SEC: "120"
          HTTP_TIMEOUT_SEC: "180"
        run: |
          make publish-smoke \
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            PLATFORM="linux/amd64" \
            EXPECTED_BUN_VERSION="${{ needs.resolve-runtime-versions.outputs.bun_version }}" \
            EXPECTED_RESTIC_VERSION="${{ needs.resolve-runtime-versions.outputs.restic_version }}"

  # Build ARM64 image on native ARM runner
  build-arm64:
    name: Build ARM64 image
    needs: [wait-for-integration, resolve-runtime-versions]
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push ARM64 image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
          build-args: |
            BUN_VERSION=${{ needs.resolve-runtime-versions.outputs.bun_version }}
            BUN_PREFER_BASELINE=${{ env.BUN_PREFER_BASELINE }}

      - name: Smoke test ARM64 image
        continue-on-error: true
        timeout-minutes: 5
        env:
          STATIC_TIMEOUT_SEC: "120"
          HTTP_TIMEOUT_SEC: "180"
        run: |
          make publish-smoke \
            IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            PLATFORM="linux/arm64" \
            EXPECTED_BUN_VERSION="${{ needs.resolve-runtime-versions.outputs.bun_version }}" \
            EXPECTED_RESTIC_VERSION="${{ needs.resolve-runtime-versions.outputs.restic_version }}"

  # Merge digests into a single multi-arch manifest
  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        working-directory: /tmp
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-arm64.outputs.digest }}

      - name: Inspect merged image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  # GitHub-native cleanup boundary: release/tag pruning stays in workflow-local
  # `github-script` blocks because it depends directly on GitHub Actions context and
  # GitHub REST APIs, with little benefit from repo-local wrapper scripts.
  prune-releases:
    name: Prune old releases
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - name: Prune releases and tags
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 15;
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            core.info(`Found ${releases.length} releases; keeping latest ${keep}.`);
            const toDelete = releases.slice(keep);
            for (const release of toDelete) {
              core.info(`Deleting release ${release.tag_name} (id ${release.id})`);
              try {
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: release.id,
                });
              } catch (error) {
                core.warning(`Failed to delete release ${release.tag_name}: ${error.message}`);
              }
              if (!release.tag_name) {
                core.info(`Release ${release.id} has no tag.`);
                continue;
              }
              try {
                const refs = await github.rest.git.listMatchingRefs({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
                if (refs.data.length === 0) {
                  core.info(`Tag ${release.tag_name} not found; skipping.`);
                  continue;
                }
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                core.warning(`Failed to delete tag ${release.tag_name}: ${error.message}`);
              }
            }

  # GitHub-native cleanup boundary: workflow-run pruning remains in YAML for the
  # same reason as release/tag pruning — it is only meaningful inside Actions.
  cleanup:
    name: Cleanup old runs and tags
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
      actions: write

    steps:
      - name: Cleanup old workflow runs and tags
        uses: actions/github-script@v7
        with:
          script: |
            const keepWorkflowRuns = 5;
            const keepTags = 15;
            const { owner, repo } = context.repo;

            // Keep only the newest workflow runs for this workflow
            core.info('Fetching workflow runs...');
            const workflow_id = 'publish.yml';
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id,
                per_page: 100
              }
            );

            const sortedRuns = runs.sort((a, b) =>
              new Date(b.created_at) - new Date(a.created_at)
            );
            const runsToDelete = sortedRuns.slice(keepWorkflowRuns);

            core.info(`Found ${runs.length} workflow runs, keeping ${keepWorkflowRuns} newest, deleting ${runsToDelete.length} older...`);
            for (const run of runsToDelete) {
              core.info(`Deleting run #${run.run_number} from ${run.created_at}`);
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
              } catch (error) {
                core.warning(`Failed to delete run ${run.id}: ${error.message}`);
              }
            }

            // Keep at least the newest 15 tags (plus current)
            core.info('Fetching tags...');
            const tags = await github.paginate(
              github.rest.repos.listTags,
              {
                owner,
                repo,
                per_page: 100
              }
            );

            const currentTag = context.ref.replace('refs/tags/', '');
            const otherTags = tags.filter(tag => tag.name !== currentTag);
            const tagsToDelete = otherTags.slice(keepTags);

            core.info(`Found ${tags.length} tags, keeping ${keepTags} newest (plus current: ${currentTag}), deleting ${tagsToDelete.length} older...`);
            for (const tag of tagsToDelete) {
              core.info(`Deleting tag ${tag.name}`);
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${tag.name}`
                });
              } catch (error) {
                core.warning(`Failed to delete tag ${tag.name}: ${error.message}`);
              }
            }

            core.info('Cleanup completed');

  # GitHub-native cleanup boundary: GHCR package pruning remains in `github-script`
  # because it uses GitHub package APIs directly and is not meaningfully reusable
  # as a local repo command.
  prune-docker-images:
    name: Prune old Docker images
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      packages: write
    steps:
      - name: Delete untagged images
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const keepCount = 5;
            const { owner, repo } = context.repo;
            const packageName = repo.toLowerCase();

            core.info(`Cleaning Docker images for repository: ${owner}/${repo}`);
            core.info(`Package name in registry: ${packageName}`);

            try {
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                {
                  package_type: 'container',
                  package_name: packageName,
                  org: owner,
                  per_page: 100,
                  state: 'active',
                }
              );

              core.info(`Found ${versions.length} package versions`);

              const taggedVersions = versions.filter(
                v => v.metadata?.container?.tags?.length > 0
              );
              const untaggedVersions = versions.filter(
                v => !v.metadata?.container?.tags || v.metadata.container.tags.length === 0
              );

              core.info(
                `Tagged versions: ${taggedVersions.length}, Untagged versions: ${untaggedVersions.length}`
              );

              const sortedTagged = taggedVersions.sort(
                (a, b) => new Date(b.created_at) - new Date(a.created_at)
              );

              const oldestKept = sortedTagged.length > 0
                ? new Date(sortedTagged[Math.min(keepCount, sortedTagged.length) - 1].created_at)
                : new Date();
              core.info(`Oldest kept tag created at: ${oldestKept.toISOString()}`);

              const untaggedToDelete = untaggedVersions.filter(v =>
                new Date(v.created_at) < oldestKept
              );
              core.info(`Untagged versions to delete: ${untaggedToDelete.length} (keeping ${untaggedVersions.length - untaggedToDelete.length} that may be referenced by kept tags)`);

              for (const version of untaggedToDelete) {
                core.info(
                  `Deleting untagged version ${version.id} (created: ${version.created_at})`
                );
                try {
                  await github.rest.packages.deletePackageVersionForOrg({
                    package_type: 'container',
                    package_name: packageName,
                    org: owner,
                    package_version_id: version.id,
                  });
                } catch (error) {
                  core.warning(
                    `Failed to delete untagged version ${version.id}: ${error.message}`
                  );
                }
              }

              const versionsToDelete = sortedTagged.slice(keepCount);

              core.info(
                `Keeping ${keepCount} newest tagged versions, deleting ${versionsToDelete.length} older ones...`
              );
              for (const version of versionsToDelete) {
                const tags = version.metadata?.container?.tags?.join(', ') || 'unknown';
                core.info(
                  `Deleting version ${version.id} with tags: ${tags} (created: ${version.created_at})`
                );
                try {
                  await github.rest.packages.deletePackageVersionForOrg({
                    package_type: 'container',
                    package_name: packageName,
                    org: owner,
                    package_version_id: version.id,
                  });
                } catch (error) {
                  core.warning(
                    `Failed to delete version ${version.id}: ${error.message}`
                  );
                }
              }
            } catch (error) {
              if (error.status === 404) {
                core.info('No package found - this might be the first build');
              } else {
                core.setFailed(`Error managing package versions: ${error.message}`);
              }
            }
